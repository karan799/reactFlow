<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#FAFBFC" rx="12"/>
  <text x="32" y="36" fill="#1C2536" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Node Abstraction Layers</text>
  <!-- Registry -->
  <rect x="32" y="56" width="576" height="52" fill="#EFF6FF" stroke="#3B82F6" rx="8"/>
  <text x="48" y="88" fill="#1E40AF" font-family="monospace" font-size="13" font-weight="600">registry.js</text>
  <text x="200" y="88" fill="#6B7280" font-family="system-ui,sans-serif" font-size="12">’ sidebar palette + React Flow nodeTypes</text>
  <!-- createNode -->
  <rect x="32" y="124" width="576" height="52" fill="#F5F3FF" stroke="#8B5CF6" rx="8"/>
  <text x="48" y="156" fill="#5B21B6" font-family="monospace" font-size="13" font-weight="600">createNode.js</text>
  <text x="200" y="156" fill="#6B7280" font-family="system-ui,sans-serif" font-size="12">’ config object becomes a React component</text>
  <!-- Core row -->
  <rect x="32" y="192" width="176" height="64" fill="#FFFFFF" stroke="#06B6D4" rx="8"/>
  <text x="48" y="220" fill="#0E7490" font-family="monospace" font-size="12" font-weight="600">BaseNode.js</text>
  <text x="48" y="240" fill="#6B7280" font-family="system-ui,sans-serif" font-size="11">shell + handles</text>
  <rect x="224" y="192" width="176" height="64" fill="#FFFFFF" stroke="#06B6D4" rx="8"/>
  <text x="240" y="220" fill="#0E7490" font-family="monospace" font-size="12" font-weight="600">fields.js</text>
  <text x="240" y="240" fill="#6B7280" font-family="system-ui,sans-serif" font-size="11">antd inputs</text>
  <rect x="416" y="192" width="192" height="64" fill="#FFFFFF" stroke="#06B6D4" rx="8"/>
  <text x="432" y="220" fill="#0E7490" font-family="monospace" font-size="12" font-weight="600">useNodeData.js</text>
  <text x="432" y="240" fill="#6B7280" font-family="system-ui,sans-serif" font-size="11">zustand bridge</text>
  <!-- Definitions -->
  <rect x="32" y="272" width="110" height="44" fill="#FFFFFF" stroke="#E5E7EB" rx="6"/>
  <text x="44" y="298" fill="#1C2536" font-family="monospace" font-size="10">inputNode</text>
  <rect x="152" y="272" width="110" height="44" fill="#FFFFFF" stroke="#E5E7EB" rx="6"/>
  <text x="172" y="298" fill="#1C2536" font-family="monospace" font-size="10">mathNode</text>
  <rect x="272" y="272" width="110" height="44" fill="#FFFFFF" stroke="#E5E7EB" rx="6"/>
  <text x="288" y="298" fill="#1C2536" font-family="monospace" font-size="10">filterNode</text>
  <rect x="392" y="272" width="110" height="44" fill="#FFFFFF" stroke="#E5E7EB" rx="6"/>
  <text x="408" y="298" fill="#1C2536" font-family="monospace" font-size="10">imageNode</text>
  <rect x="512" y="272" width="96" height="44" fill="#FFFFFF" stroke="#E5E7EB" rx="6"/>
  <text x="528" y="298" fill="#1C2536" font-family="monospace" font-size="10">apiNode</text>
  <text x="32" y="340" fill="#6B7280" font-family="system-ui,sans-serif" font-size="11">definitions/  each file is ~2060 lines of declarative config</text>
  <line x1="320" y1="108" x2="320" y2="124" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="320" y1="176" x2="320" y2="192" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="320" y1="256" x2="320" y2="272" stroke="#CBD5E1" stroke-width="2"/>
</svg>
