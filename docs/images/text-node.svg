<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280">
  <rect width="520" height="280" fill="#FAFBFC" rx="12"/>
  <text x="24" y="32" fill="#1C2536" font-family="system-ui,sans-serif" font-size="15" font-weight="700">Text Node  dynamic handles &amp; resize</text>
  <!-- Text node box -->
  <rect x="160" y="60" width="280" height="120" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" rx="10"/>
  <rect x="160" y="60" width="280" height="3" fill="#F59E0B" rx="1"/>
  <text x="176" y="88" fill="#1C2536" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Text</text>
  <text x="176" y="104" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">2 variables</text>
  <!-- Handles left -->
  <circle cx="160" cy="120" r="6" fill="#FFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="118" y="124" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">input</text>
  <circle cx="160" cy="150" r="6" fill="#FFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="118" y="154" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">name</text>
  <!-- Handle right -->
  <circle cx="440" cy="135" r="6" fill="#FFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="452" y="139" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">output</text>
  <!-- Textarea content -->
  <rect x="176" y="112" width="248" height="52" fill="#F9FAFB" stroke="#E5E7EB" rx="4"/>
  <text x="184" y="132" fill="#1C2536" font-family="monospace" font-size="11">Hello {{ name }},</text>
  <text x="184" y="150" fill="#1C2536" font-family="monospace" font-size="11">welcome {{ input }}!</text>
  <!-- Flow arrows -->
  <rect x="24" y="200" width="140" height="56" fill="#FFFBEB" stroke="#F59E0B" rx="8"/>
  <text x="36" y="224" fill="#92400E" font-family="system-ui,sans-serif" font-size="11" font-weight="600">textParsing.js</text>
  <text x="36" y="242" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">parseVariables()</text>
  <line x1="164" y1="228" x2="200" y2="120" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="188" y="200" width="140" height="56" fill="#FFFBEB" stroke="#F59E0B" rx="8"/>
  <text x="200" y="224" fill="#92400E" font-family="system-ui,sans-serif" font-size="11" font-weight="600">width fn</text>
  <text x="200" y="242" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">canvas measureText</text>
  <line x1="260" y1="200" x2="300" y2="180" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="352" y="200" width="144" height="56" fill="#FFFBEB" stroke="#F59E0B" rx="8"/>
  <text x="364" y="224" fill="#92400E" font-family="system-ui,sans-serif" font-size="11" font-weight="600">syncHandles</text>
  <text x="364" y="242" fill="#6B7280" font-family="system-ui,sans-serif" font-size="10">store.js  edge cleanup</text>
</svg>
